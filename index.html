    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; color: #333; background-color: #fdfbf7; line-height: 1.6; }
        
        /* Header */
        header { padding: 80px 20px; text-align: center; background-color: #fdfbf7; }
        .crp-topo { color: #d4af37; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; font-size: 11px; margin-bottom: 15px; display: block; }
        h1 { font-family: 'Playfair Display', serif; font-size: clamp(28px, 5vw, 42px); color: #2c3e50; margin: 10px 0; font-weight: 700; line-height: 1.2; }
        .descricao-topo { max-width: 750px; margin: 25px auto; color: #7f8c8d; font-size: 18px; font-weight: 300; }

        /* Grid de Padrões */
        .secao-padroes { padding: 60px 20px; text-align: center; background-color: #fff; }
        .padroes-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; max-width: 1200px; margin: 40px auto; }
        
        .card { 
            background: #fdfbf7; border-radius: 4px; border: 1px solid #eee; width: 280px; padding: 40px 30px; 
            transition: 0.3s; cursor: pointer; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.01);
        }
        .card:hover { transform: translateY(-5px); border-color: #d4af37; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .card-num { font-family: 'Playfair Display', serif; font-size: 40px; color: #d4af37; opacity: 0.3; margin-bottom: 10px; }
        .card-titulo { font-family: 'Playfair Display', serif; font-size: 18px; color: #2c3e50; margin-bottom: 15px; min-height: 50px; font-weight: 700; }
        
        /* Tópicos internos (visíveis no hover) */
        .card-desc { list-style: none; padding: 0; margin: 0; opacity: 0; max-height: 0; transition: 0.4s ease; overflow: hidden; }
        .card:hover .card-desc { opacity: 1; max-height: 200px; margin-top: 15px; }
        .card-desc li { font-size: 13px; color: #666; margin-bottom: 8px; position: relative; padding-left: 18px; }
        .card-desc li::before { content: "•"; color: #d4af37; position: absolute; left: 0; font-weight: bold; }

        /* CTA WhatsApp */
        .cta-whats { padding: 100px 20px; text-align: center; background-color: #fdfbf7; }
        .btn-whats { 
            background-color: #25d366; color: white; padding: 22px 50px; text-decoration: none; 
            border-radius: 4px; font-weight: bold; display: inline-block; margin-top: 25px;
            transition: 0.3s; font-size: 16px; letter-spacing: 1px;
        }
        .btn-whats:hover { background-color: #128c7e; transform: scale(1.03); }

        /* Footer */
        footer { padding: 80px 20px; text-align: center; background-color: #2c3e50; color: #fff; }
        .footer-nome { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 10px; display: block; }
        .footer-crp { opacity: 0.7; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
