<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thays Moya - Psicologia Sistêmica</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; color: #333; background-color: #fff; }
        header { padding: 40px 20px; text-align: center; background-color: #fdfbf7; }
        h1 { font-family: 'Playfair Display', serif; font-size: 36px; color: #2c3e50; margin: 0; }
        .subtitulo { color: #d4af37; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; font-size: 14px; }

        /* Seção dos 5 Padrões */
        .secao-padroes { padding: 60px 20px; text-align: center; background-color: #fff; }
        .padroes-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 40px; }
        .card { 
            background: white; border-radius: 15px; border: 1px solid #eee; width: 280px; padding: 30px; 
            transition: 0.4s; cursor: pointer; position: relative; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            text-align: left;
        }
        .card:hover { transform: translateY(-10px); border-color: #d4af37; box-shadow: 0 12px 24px rgba(0,0,0,0.08); }
        .card-num { font-family: 'Playfair Display', serif; font-size: 40px; color: #d4af37; opacity: 0.5; margin-bottom: 15px; text-align: center; }
        .card-titulo { font-weight: 700; font-size: 18px; margin-bottom: 10px; color: #2c3e50; text-align: center; min-height: 50px; }
        
        /* Lista de tópicos - Aparece no Hover */
        .card-desc { font-size: 13px; color: #666; line-height: 1.6; opacity: 0; max-height: 0; transition: 0.5s; list-style: none; padding: 0; margin: 0; }
        .card-desc li { margin-bottom: 8px; position: relative; padding-left: 15px; }
        .card-desc li::before { content: "•"; color: #d4af37; position: absolute; left: 0; font-weight: bold; }
        .card:hover .card-desc { opacity: 1; max-height: 200px; margin-top: 15px; }

        /* Order Bump Box */
        .order-bump { 
            max-width: 600px; margin: 50px auto; border: 2px dashed #d4af37; padding: 30px; 
            border-radius: 20px; background-color: #fffef2; text-align: center;
        }
        .preco { font-size: 28px; font-weight: bold; color: #27ae60; margin: 15px 0; }
        .btn-lastlink { 
            display: inline-block; background-color: #1a5276; color: white; text-decoration: none; 
            padding: 18px 40px; border-radius: 8px; font-weight: bold; transition: 0.3s; width: 80%;
        }
        .btn-lastlink:hover { background-color: #154360; transform: scale(1.02); }

        /* Rodapé e Botão Whats */
        footer { padding: 40px 20px; text-align: center; background-color: #2c3e50; color: white; margin-top: 60px; }
        .btn-whats { 
            background-color: #25d366; color: white; padding: 15px 30px; text-decoration: none; 
            border-radius: 50px; font-weight: bold; display: inline-block; margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <div class="subtitulo">Psicologia Sistêmica Integrativa</div>
    <h1>Thays Moya</h1>
    <p style="max-width: 600px; margin: 20px auto; color: #7f8c8d;">
        Ajudando mulheres a romperem padrões invisíveis e retomarem sua força pessoal.
    </p>
</header>
